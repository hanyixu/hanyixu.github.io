    <style>
      .cv-download-wrap {
        position: relative;
        display: inline-block;
        margin: 0 0 1.25rem;
      }
      .cv-file-info {
        position: absolute;
        left: 50%;
        top: 100%;
        transform: translateX(-50%);
        margin-top: 0.45rem;
        padding: 0.55rem 0.7rem;
        min-width: 12rem;
        max-width: min(20rem, 92vw);
        font-size: 0.72rem;
        line-height: 1.45;
        color: #555 !important;
        text-align: left;
        font-weight: 400;
        background: #fff;
        border: 1px solid #cfd3d6;
        border-radius: 6px;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.1);
        z-index: 30;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        transition:
          opacity 0.12s ease,
          visibility 0.12s ease;
      }
      .cv-download-wrap:hover .cv-file-info,
      .cv-download-wrap:focus-within .cv-file-info {
        opacity: 1;
        visibility: visible;
      }
      a.btn.cv-download {
        display: inline-block;
        width: auto;
        margin: 0;
        padding: 0.5em 1em;
        font-size: 0.875em;
        line-height: 1.3;
        color: #111 !important;
        background-color: #fff !important;
        border: 1px solid #111 !important;
        border-radius: 4px;
      }
      a.btn.cv-download:hover {
        color: #fff !important;
        background-color: #111 !important;
        border-color: #111 !important;
      }
      .cv-download .fa-fw {
        margin-right: 0.5em;
      }
      .cv-supplement {
        margin: 0;
        max-width: 5.5rem;
      }
      .cv-supplement img {
        display: block;
        width: 100%;
        max-width: 5.5rem;
        height: auto;
        border-radius: 4px;
      }
      .cv-supplement figcaption {
        margin-top: 0.45em;
        font-size: 0.7rem;
        line-height: 1.25;
        color: var(--global-fig-caption-color, #777a7d);
      }
    </style>
