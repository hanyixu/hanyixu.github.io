    <div class="site-shell">

            <h1 class="text-display">Photo Lab</h1>
            <p class="text-body-lg" data-site-content="photoLab.intro">A collection of visual explorations—moments of symmetry, light, and structured chaos in the built environment and beyond.</p>

        </div>
      </footer>

    <div class="photo-lab-lightbox hidden" id="photo-lab-lightbox" role="dialog" aria-modal="true" aria-label="Photo viewer">

      <button class="photo-lab-lightbox__nav photo-lab-lightbox__next" type="button" aria-label="Next photo">&#10095;</button>
      <figure class="photo-lab-lightbox__figure">
        <img class="photo-lab-lightbox__img" alt="">
        <figcaption class="photo-lab-lightbox__caption"></figcaption>
      </figure>
    </div>
